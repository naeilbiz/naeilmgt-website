<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공지사항 관리 — 내일종합관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/carbon.css" />
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
<style>
/* 로그인 화면 */
.login-box{text-align:center;padding:120px 20px;}
.login-box h2{font-size:28px;margin-bottom:16px;}
.login-box p{font-size:18px;color:var(--ink-muted);margin-bottom:32px;}
.login-btn{background:var(--primary);color:#fff;border:none;padding:18px 40px;border-radius:var(--r-btn);font-size:20px;font-weight:700;cursor:pointer;font-family:var(--font);}
.login-btn:hover{background:var(--blue-hover);}

/* 상단 바 */
.admin-bar{background:var(--primary);color:#fff;padding:18px 0;}
.admin-bar .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.admin-bar h1{font-size:22px;font-weight:700;}
.admin-bar .user{display:flex;align-items:center;gap:12px;font-size:var(--t-body-sm);}
.admin-bar button{background:#fff;color:var(--primary);border:none;padding:10px 20px;border-radius:var(--r-btn);font-size:var(--t-body-sm);font-weight:600;cursor:pointer;font-family:var(--font);}

/* 툴바 */
.toolbar{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
.btn-new{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:none;padding:14px 28px;border-radius:var(--r-btn);font-size:var(--t-body-sm);font-weight:600;cursor:pointer;font-family:var(--font);box-shadow:0 4px 14px rgba(33,69,154,.22);}
.btn-new:hover{background:var(--blue-hover);}

/* 테이블 내 액션 버튼 */
.actions{display:flex;gap:6px;}
.actions button{padding:8px 16px;border-radius:var(--r-xs);border:none;font-size:var(--t-body-sm);font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-edit{background:rgba(33,69,154,.1);color:var(--primary);}
.btn-edit:hover{background:rgba(33,69,154,.2);}
.btn-del{background:rgba(207,74,60,.1);color:var(--alert);}
.btn-del:hover{background:rgba(207,74,60,.2);}

/* 에디터 화면 */
.editor-box{display:none;background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-lg);padding:48px;box-shadow:var(--sh-sm);}
.editor-box h2{font-size:var(--t-headline);font-weight:700;margin-bottom:32px;}
.field{margin-bottom:24px;}
.field label{display:block;font-size:var(--t-body);font-weight:600;margin-bottom:8px;}
.field input,.field select{width:100%;padding:14px 16px;font-size:var(--t-body);border:1px solid var(--hairline);border-radius:var(--r-sm);font-family:var(--font);background:var(--surface-1);transition:all .15s ease;}
.field input:focus,.field select:focus{outline:none;border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(33,69,154,.12);}
#editor{height:350px;font-size:17px;line-height:1.8;}
.editor-actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}
.btn-save{background:var(--primary);color:#fff;border:none;padding:14px 36px;border-radius:var(--r-btn);font-size:var(--t-body);font-weight:700;cursor:pointer;font-family:var(--font);box-shadow:0 4px 14px rgba(33,69,154,.22);}
.btn-save:hover{background:var(--blue-hover);}
.btn-cancel{background:var(--surface-1);color:var(--ink);border:1px solid var(--hairline);padding:14px 28px;border-radius:var(--r-btn);font-size:var(--t-body);font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-cancel:hover{background:var(--surface-2);}

/* Quill 커스텀 */
.ql-toolbar.ql-snow{border-radius:var(--r-sm) var(--r-sm) 0 0;border-color:var(--hairline);}
.ql-container.ql-snow{border-radius:0 0 var(--r-sm) var(--r-sm);border-color:var(--hairline);}
.ql-editor img{max-width:100%;border-radius:var(--r-sm);margin:12px 0;}
.ql-snow .ql-tooltip{z-index:100;}

.empty-row td{text-align:center;padding:60px 20px;color:var(--ink-muted);font-size:var(--t-body);}

/* 상세 보기 */
.notice-detail{max-width:800px;margin:0 auto;}
.notice-meta{display:flex;align-items:center;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.notice-meta .cat{font-size:14px;font-weight:600;padding:6px 14px;border-radius:20px;background:#f0f0f0;white-space:nowrap;}
.notice-meta .cat.notice{background:rgba(33,69,154,.1);color:#21459a;}
.notice-meta .date{font-size:var(--t-body-sm);color:var(--ink-subtle);}
.notice-title{font-size:var(--t-headline);font-weight:700;line-height:1.4;letter-spacing:-0.6px;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid var(--hairline);}
.notice-content{font-size:var(--t-body-lg);line-height:1.9;color:var(--ink);}
.notice-content img{max-width:100%;border-radius:var(--r-md);margin:20px 0;}
.notice-content h1,.notice-content h2,.notice-content h3{margin:28px 0 14px;line-height:1.4;}
.notice-content ul,.notice-content ol{margin:14px 0;padding-left:24px;}
.notice-content li{margin-bottom:8px;}
.notice-content strong{font-weight:700;}
.notice-content em{font-style:italic;}
.notice-content a{color:var(--primary);text-decoration:underline;}
.detail-actions{display:flex;gap:12px;margin-top:48px;padding-top:32px;border-top:1px solid var(--hairline);}
.detail-actions .btn-edit{padding:14px 32px;border-radius:var(--r-btn);font-size:var(--t-body);font-weight:700;cursor:pointer;font-family:var(--font);background:rgba(33,69,154,.1);color:var(--primary);border:none;}
.detail-actions .btn-edit:hover{background:rgba(33,69,154,.2);}
.detail-actions .btn-del{padding:14px 32px;border-radius:var(--r-btn);font-size:var(--t-body);font-weight:700;cursor:pointer;font-family:var(--font);background:rgba(207,74,60,.1);color:var(--alert);border:none;}
.detail-actions .btn-del:hover{background:rgba(207,74,60,.2);}
.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:var(--t-body);font-weight:600;color:var(--primary);margin-bottom:32px;cursor:pointer;}
.back-btn:hover{color:var(--blue-60);}
.board tbody tr{cursor:pointer;}
.board tbody tr:hover{background:var(--surface-1);}
</style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h2>내일종합관리 공지사항 관리</h2>
  <p>관리자 계정으로 로그인해주세요</p>
  <button class="login-btn" onclick="doLogin()">Google 로그인</button>
</div>

<div id="adminScreen" style="display:none;">

<div style="background:var(--primary);color:#fff;padding:20px 0;">
  <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <h1 style="font-size:22px;font-weight:700;">공지사항 관리</h1>
    <div style="display:flex;align-items:center;gap:12px;font-size:var(--t-body-sm);">
      <span id="userEmail"></span>
      <button onclick="doLogout()" style="background:#fff;color:var(--primary);border:none;padding:8px 18px;border-radius:var(--r-btn);font-size:var(--t-body-sm);font-weight:600;cursor:pointer;font-family:var(--font);">로그아웃</button>
    </div>
  </div>
</div>

<section>
  <div class="wrap">
    <!-- 목록 -->
    <div id="listView">
      <div class="toolbar">
        <p style="font-size:var(--t-body-sm);color:var(--ink-muted);">전체 <b style="color:var(--ink);" id="totalCount">0</b>건 · 최신순</p>
        <button class="btn-new" onclick="showEditor()">+ 새 공지 작성</button>
      </div>

      <table class="board">
        <thead>
          <tr>
            <th class="c">분류</th>
            <th>제목</th>
            <th class="c hide-m">작성일</th>
          </tr>
        </thead>
        <tbody id="noticeBody">
          <tr><td colspan="3" class="empty-row" style="text-align:center;padding:60px;color:var(--ink-muted);">불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 상세 보기 -->
    <div id="detailView" style="display:none;">
      <div class="back-btn" onclick="hideDetail()">← 목록으로 돌아가기</div>
      <div class="notice-detail" id="detailContent"></div>
    </div>

    <!-- 에디터 -->
    <div id="editorView" class="editor-box">
      <h2 id="editorTitle">새 공지 작성</h2>
      <div class="field">
        <label>분류</label>
        <select id="fieldCat">
          <option value="공지">공지</option>
          <option value="서비스">서비스</option>
          <option value="안전">안전</option>
          <option value="소식">소식</option>
        </select>
      </div>
      <div class="field">
        <label>제목</label>
        <input type="text" id="fieldTitle" placeholder="제목을 입력하세요" />
      </div>
      <div class="field">
        <label>내용</label>
        <div id="editor"></div>
      </div>
      <div class="editor-actions">
        <button class="btn-save" onclick="saveNotice()">저장</button>
        <button class="btn-cancel" onclick="hideEditor()">취소</button>
      </div>
    </div>
  </div>
</section>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- Quill -->
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAzsogD5a0pjVOi_nEL5x5OymlPkbxCIWM",
  authDomain: "naeilmgt-website.firebaseapp.com",
  projectId: "naeilmgt-website",
  storageBucket: "naeilmgt-website.firebasestorage.app",
  messagingSenderId: "327929187768",
  appId: "1:327929187768:web:dc0c2038878d13d93c934d"
});

var db = firebase.firestore();
var auth = firebase.auth();
var quill = null;
var editingId = null;

// HTML 내 모든 base64 이미지를 압축해서 교체한 HTML 반환
function compressHtmlImages(html) {
  var regex = /src="(data:image\/[^"]+)"/g;
  var matches = [];
  var m;
  while ((m = regex.exec(html)) !== null) {
    if (m[1].length > 100000) matches.push(m[1]);
  }
  if (matches.length === 0) return Promise.resolve(html);

  var tasks = matches.map(function(dataUrl) {
    return new Promise(function(resolve) {
      var parts = dataUrl.split(',');
      var mime = parts[0].match(/:(.*?);/)[1];
      var binary = atob(parts[1]);
      var arr = new Uint8Array(binary.length);
      for (var j = 0; j < binary.length; j++) arr[j] = binary.charCodeAt(j);
      var blob = new Blob([arr], { type: mime });
      var blobUrl = URL.createObjectURL(blob);

      var img = new Image();
      img.onload = function() {
        URL.revokeObjectURL(blobUrl);
        var maxW = 1000;
        var w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        var q = 0.92;
        var out = c.toDataURL('image/jpeg', q);
        while (out.length > 700000 && q > 0.3) {
          q -= 0.05;
          out = c.toDataURL('image/jpeg', q);
        }
        resolve({ original: dataUrl, compressed: out });
      };
      img.onerror = function() {
        URL.revokeObjectURL(blobUrl);
        resolve({ original: dataUrl, compressed: dataUrl });
      };
      img.src = blobUrl;
    });
  });

  return Promise.all(tasks).then(function(results) {
    var out = html;
    results.forEach(function(r) {
      out = out.split(r.original).join(r.compressed);
    });
    return out;
  });
}

// Quill 초기화
function initQuill() {
  if (quill) return;
  quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: '내용을 입력하세요...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ 'color': [] }, { 'background': [] }],
        [{ 'list': 'ordered' }, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['image', 'link'],
        ['clean']
      ],
      clipboard: { matchVisual: false }
    }
  });

  quill.getModule('toolbar').addHandler('image', function() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = function() {
      if (!input.files[0]) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var range = quill.getSelection(true);
        quill.insertEmbed(range.index, 'image', e.target.result);
      };
      reader.readAsDataURL(input.files[0]);
    };
    input.click();
  });
}

// 로그인
function doLogin() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) {
    alert('로그인 실패: ' + e.message);
  });
}

function doLogout() {
  if (confirm('로그아웃 하시겠습니까?')) auth.signOut();
}

// 인증 상태 감지
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email + ' (로그아웃)';
    initQuill();
    loadNotices();
  } else {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminScreen').style.display = 'none';
  }
});

// 공지 목록 로드
function loadNotices() {
  db.collection('notices').orderBy('createdAt', 'desc').get().then(function(snap) {
    var body = document.getElementById('noticeBody');
    var total = snap.size;
    document.getElementById('totalCount').textContent = total;

    if (snap.empty) {
      body.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:60px;color:var(--ink-muted);">등록된 공지사항이 없습니다</td></tr>';
      return;
    }

    var html = '';
    var num = total;
    snap.forEach(function(doc) {
      var d = doc.data();
      var isNotice = d.category === '공지';
      var catClass = isNotice ? ' notice' : '';
      var date = d.createdAt ? d.createdAt.toDate().toISOString().slice(0, 10) : '';

      var isNew = false;
      if (d.createdAt) {
        var diff = Date.now() - d.createdAt.toDate().getTime();
        isNew = diff < 7 * 24 * 60 * 60 * 1000;
      }
      var newBadge = isNew ? '<span class="b-new">N</span>' : '';

      html += '<tr onclick="showDetail(\'' + doc.id + '\')">' +
        '<td class="c"><span class="b-cat' + catClass + '">' + (d.category || '소식') + '</span></td>' +
        '<td><span class="b-title">' + escHtml(d.title) + '</span>' + newBadge + '</td>' +
        '<td class="c hide-m">' + date + '</td>' +
      '</tr>';
      num--;
    });
    body.innerHTML = html;
  });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 현재 뷰 상태
var currentView = 'list';
history.replaceState({ view: 'list' }, '');

// 브라우저 뒤로가기 처리
window.addEventListener('popstate', function() {
  goToList();
});

function goToList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('editorView').style.display = 'none';
  currentView = 'list';
}

// 상세 보기
function showDetail(id) {
  history.pushState({ view: 'detail', id: id }, '');
  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  var el = document.getElementById('detailContent');
  el.innerHTML = '<div style="text-align:center;padding:80px 0;color:var(--ink-muted);">불러오는 중...</div>';

  db.collection('notices').doc(id).get().then(function(doc) {
    if (!doc.exists) {
      el.innerHTML = '<div style="text-align:center;padding:80px 0;color:var(--ink-muted);">존재하지 않는 공지사항입니다</div>';
      return;
    }
    var d = doc.data();
    var catClass = d.category === '공지' ? ' notice' : '';
    var date = d.createdAt ? d.createdAt.toDate().toISOString().slice(0, 10) : '';

    el.innerHTML =
      '<div class="notice-meta">' +
        '<span class="cat' + catClass + '">' + (d.category || '소식') + '</span>' +
        '<span class="date">' + date + '</span>' +
      '</div>' +
      '<h2 class="notice-title">' + escHtml(d.title) + '</h2>' +
      '<div class="notice-content">' + d.content + '</div>' +
      '<div class="detail-actions">' +
        '<button class="btn-edit" onclick="editNotice(\'' + doc.id + '\')">수정</button>' +
        '<button class="btn-del" onclick="deleteNoticeFromDetail(\'' + doc.id + '\')">삭제</button>' +
      '</div>';
  });
}

function hideDetail() {
  goToList();
  history.replaceState({ view: 'list' }, '');
}

function deleteNoticeFromDetail(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  db.collection('notices').doc(id).delete().then(function() {
    goToList();
    history.replaceState({ view: 'list' }, '');
    loadNotices();
  });
}

// 에디터 표시
function showEditor(id) {
  editingId = id || null;
  if (currentView === 'list') {
    history.pushState({ view: 'editor' }, '');
  }
  currentView = 'editor';
  document.getElementById('listView').style.display = 'none';
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('editorView').style.display = 'block';
  document.getElementById('editorTitle').textContent = id ? '공지 수정' : '새 공지 작성';
  document.getElementById('fieldTitle').value = '';
  document.getElementById('fieldCat').value = '공지';
  quill.setContents([]);
}

function hideEditor() {
  editingId = null;
  goToList();
  history.replaceState({ view: 'list' }, '');
}

// 수정
function editNotice(id) {
  db.collection('notices').doc(id).get().then(function(doc) {
    if (!doc.exists) return;
    var d = doc.data();
    document.getElementById('detailView').style.display = 'none';
    showEditor(id);
    document.getElementById('fieldTitle').value = d.title || '';
    document.getElementById('fieldCat').value = d.category || '공지';
    quill.root.innerHTML = d.content || '';
  });
}

// 삭제
function deleteNotice(id) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  db.collection('notices').doc(id).delete().then(function() {
    loadNotices();
  });
}

// 저장
function saveNotice() {
  var title = document.getElementById('fieldTitle').value.trim();
  var category = document.getElementById('fieldCat').value;

  if (!title) { alert('제목을 입력해주세요'); return; }

  var saveBtn = document.querySelector('.btn-save');
  saveBtn.textContent = '저장 중...';
  saveBtn.disabled = true;

  var rawHtml = quill.root.innerHTML;
  compressHtmlImages(rawHtml).then(function(content) {
    var sizeKB = Math.round(new Blob([content]).size / 1024);
    if (sizeKB > 900) {
      alert('내용이 너무 큽니다 (' + sizeKB + 'KB). 이미지 개수를 줄여주세요. (최대 약 900KB)');
      saveBtn.textContent = '저장';
      saveBtn.disabled = false;
      return;
    }

    var data = {
      title: title,
      category: category,
      content: content,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    var promise;
    if (editingId) {
      promise = db.collection('notices').doc(editingId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      promise = db.collection('notices').add(data);
    }

    promise.then(function() {
      saveBtn.textContent = '저장';
      saveBtn.disabled = false;
      goToList();
      history.replaceState({ view: 'list' }, '');
      loadNotices();
    }).catch(function(e) {
      saveBtn.textContent = '저장';
      saveBtn.disabled = false;
      alert('저장 실패: ' + e.message);
    });
  });
}
</script>
</body>
</html>
